<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tin Tie Coffee — Business Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
  }

  .print-note {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
    text-align: center;
  }

  /* 3.5" x 2" at 96dpi = 336x192 — scaled 2.5x for screen preview */
  .card {
    width: 3.5in;
    height: 2in;
    border: 1px solid #000;
    background: #fff;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 0.18in 0.22in;
    gap: 0.15in;
  }

  .left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 0.08in;
    flex: 1;
  }

  .logo img {
    width: 1.6in;
    height: auto;
    display: block;
    /* make logo black & white */
    filter: grayscale(100%) contrast(120%);
  }

  .divider {
    width: 100%;
    height: 0.5px;
    background: #000;
  }

  .name {
    font-family: Georgia, serif;
    font-size: 11pt;
    font-weight: bold;
    color: #000;
    letter-spacing: 0.02em;
  }

  .title {
    font-family: Georgia, serif;
    font-size: 7pt;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #000;
  }

  .url {
    font-family: Georgia, serif;
    font-size: 6.5pt;
    color: #333;
    letter-spacing: 0.05em;
  }

  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .qr-wrap {
    border: 1px solid #000;
    padding: 4px;
    background: #fff;
  }

  .qr-wrap img {
    width: 0.85in;
    height: 0.85in;
    display: block;
    filter: grayscale(100%) contrast(150%);
  }

  .scan-label {
    font-size: 5.5pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #000;
    text-align: center;
  }

  @media print {
    body { background: white; }
    .print-note { display: none; }
    .card { border: 0.5pt solid #000; }
    @page { size: 3.5in 2in; margin: 0; }
  }
</style>
</head>
