<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tin Tie Coffee - Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    padding: 40px 20px;
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #2C1810;
    margin-bottom: 30px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .card-wrap {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Standard business card: 3.5" x 2" at 96dpi = 336x192px, scale up 2.5x */
  .card {
    width: 840px;
    height: 480px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(44,24,16,0.25);
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }

  /* FRONT */
  .card-front {
    background: #2C1810;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 50px 60px;
    color: #F5F0E8;
  }

  .card-front .left {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card-front .logo-area {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .card-front .logo-area svg {
    width: 110px;
    height: 100px;
    color: #D4A853;
    flex-shrink: 0;
  }

  .card-front .brand-text {
    display: flex;
    flex-direction: column;
  }

  .card-front .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.6rem;
    color: #D4A853;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .card-front .brand-sub {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: #F5F0E8;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .card-front .divider {
    width: 100%;
    height: 1px;
    background: rgba(212,168,83,0.3);
  }

  .card-front .contact-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-front .person-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: #F5F0E8;
  }

  .card-front .person-title {
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #D4A853;
    font-weight: 300;
  }

  .card-front .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .card-front .qr-wrap {
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .card-front .qr-wrap img {
    width: 160px;
    height: 160px;
    display: block;
  }

  .card-front .qr-label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    text-align: center;
  }

  /* BACK */
  .card-back {
    background: #F5F0E8;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .card-back svg {
    width: 200px;
    height: 180px;
    color: #2C1810;
  }

  .card-back .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: #2C1810;
    letter-spacing: 0.05em;
    opacity: 0.6;
  }

  .card-back .accent-line {
    width: 60px;
    height: 2px;
    background: #D4A853;
    border-radius: 2px;
  }

  .print-note {
    margin-top: 30px;
    font-size: 0.8rem;
    color: #8B7355;
    text-align: center;
    max-width: 840px;
  }

  @media print {
    body { background: white; padding: 0; }
    h2, .print-note { display: none; }
    .card-wrap { gap: 0; flex-direction: column; }
    .card { box-shadow: none; border-radius: 0; page-break-after: always; }
  }
</style>
</head>
